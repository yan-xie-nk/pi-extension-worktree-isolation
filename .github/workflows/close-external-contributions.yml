name: Close external contributions

on:
  pull_request_target:
    types: [opened, reopened]
  issues:
    types: [opened, reopened]

permissions:
  issues: write
  pull-requests: write

jobs:
  close:
    if: github.actor != github.repository_owner
    runs-on: ubuntu-latest
    steps:
      - name: Close issue
        if: github.event_name == 'issues'
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
        run: |
          gh issue close "$ISSUE_URL" --comment "This repository is public for installation, auditability, and reference, but it is not accepting external contributions or support requests. Closing this issue without review."

      - name: Close pull request
        if: github.event_name == 'pull_request_target'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          gh pr close "$PR_URL" --comment "This repository is public for installation, auditability, and reference, but it is not accepting external contributions or unsolicited pull requests. Closing this pull request without review."
